<style>
    body {
        font-family: monospace;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    .repl-box {
        background: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }

    textarea {
        width: 100%;
        height: 150px;
        font-family: monospace;
        font-size: 15px;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #fafafa;
        resize: vertical;
    }

    button {
        background: #007bff;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #0056b3;
    }

    .output-box {
        background: #1e1e1e;
        color: #00ff55;
        padding: 20px;
        border-radius: 8px;
        min-height: 150px;
        white-space: pre-wrap;
        font-size: 14px;
    }
</style>
<div class="container">

    <h1>Customer Web REPL</h1>

    <div class="repl-box">
        <label for="code">Enter S-Expression:</label>
        <textarea id="code" placeholder="(+ 1 2)" spellcheck="false"></textarea>
        <button onclick="runCode()">Run</button>
    </div>

    <h3>Output:</h3>
    <div id="output" class="output-box">(Results will appear here)</div>

</div>

<script>
async function runCode() {
    const code = document.getElementById("code").value;
    const outputBox = document.getElementById("output");

    outputBox.textContent = "Running...";

    try {
        // After backend controller is ready, replace this placeholder URL
        const response = await fetch("/repl/eval", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
        });

        const result = await response.json();

        if (result.error) {
            outputBox.textContent = "ERROR: " + result.error;
        } else {
            outputBox.textContent = result.output;
        }

    } catch (err) {
        outputBox.textContent = "Network Error: " + err;
    }
}
</script>
